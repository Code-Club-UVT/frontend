name: Production release

on:
    create:

jobs:
    deploy-release-image:
        if: startsWith(github.ref, 'refs/heads/release/')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code (full history)
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract version from branch name
              id: get_version
              run: |
                  BRANCH=${GITHUB_REF#refs/heads/}
                  VERSION=${BRANCH#release/}
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Build and push release image
              uses: docker/build-push-action@v6
              with:
                  context: app
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ env.VERSION }}

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      cd /home/${{ secrets.USERNAME }}/CodeClubUVT/Scripts
                      sudo ENVIRONMENT=Production IMAGE_NAME=frontend IMAGE_TAG=${{ env.VERSION }} ./start-container.sh
