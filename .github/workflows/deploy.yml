name: Development deployment

on:
    push:
        branches: [main]

jobs:
    deploy-dev-image:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push dev image
              uses: docker/build-push-action@v6
              with:
                  context: app
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/frontend:dev-latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/frontend:dev-${{ github.sha }}

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      cd /home/${{ secrets.USERNAME }}/CodeClubUVT/Scripts
                      sudo ENVIRONMENT=Development IMAGE_NAME=frontend IMAGE_TAG=dev-${{ github.sha }} ./start-container.sh